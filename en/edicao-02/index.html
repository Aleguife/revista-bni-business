    /* ============================================================
       TOKENS
       ============================================================ */
    :root {
      --red:    #CC0000;
      --ink:    #111111;
      --paper:    #F5F0E8;
      --paper-2:  #ebe9e4;
      --hero-bg:  #E5DECF;
      --white:  #ffffff;
      --rule:   #1111111a;
      --rule-strong: #11111133;
      --muted:  #11111199;

      --f-display: "Playfair Display", Georgia, serif;
      --f-body:    "Barlow", system-ui, sans-serif;
      --f-ui:      "Barlow Condensed", "Barlow", system-ui, sans-serif;

      --max:    1320px;
      --gutter: clamp(20px, 4vw, 56px);
    }

    /* ============================================================
       RESET
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--f-body);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ============================================================
       UTIL
       ============================================================ */
    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding-left: var(--gutter);
      padding-right: var(--gutter);
    }

    .retranca {
      font-family: var(--f-ui);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--red);
    }

    .rule {
      height: 1px;
      background: var(--ink);
      opacity: 0.85;
      width: 100%;
    }
    .rule.thin { opacity: 0.18; }

    /* ============================================================
       FADE-UP (igual ao home, 0.8s ease forwards)
       ============================================================ */
    .fade-up {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s ease forwards;
    }
    .fade-up.d1 { animation-delay: 0.05s; }
    .fade-up.d2 { animation-delay: 0.15s; }
    .fade-up.d3 { animation-delay: 0.25s; }
    .fade-up.d4 { animation-delay: 0.35s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fade-up { animation: none; opacity: 1; transform: none; }
      .card:hover .card__media img { transform: none !important; }
    }

    /* ============================================================
       HERO
       ============================================================ */
    .hero {
      display: block;
      grid-template-columns: none;
      min-height: auto;
      background: var(--hero-bg);
      padding-top: 100px;
      padding-bottom: 100px;
      border-bottom: 1px solid var(--rule);
    }
    .hero__grid {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: clamp(32px, 5vw, 80px);
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero__copy { padding-bottom: 8px; max-width: 540px; }
    .hero__retranca { margin-bottom: 28px; display: inline-flex; align-items: center; gap: 14px; }
    .hero__retranca::after {
      content: "";
      display: inline-block;
      width: 48px; height: 1px;
      background: var(--red);
      transform: translateY(-3px);
    }

    .hero__title {
      font-family: var(--f-display);
      font-weight: 900;
      font-style: italic;
      font-size: clamp(56px, 11vw, 168px);
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin: 0 0 32px;
      color: var(--ink);
    }
    .hero__title em {
      font-style: italic;
      color: var(--ink);
    }

    .hero__sub {
      font-family: var(--f-body);
      font-weight: 300;
      font-size: clamp(18px, 1.6vw, 22px);
      line-height: 1.45;
      max-width: 38ch;
      color: var(--ink);
      margin: 0 0 32px;
      text-wrap: balance;
    }

    .hero__stats {
      display: flex;
      gap: 36px;
      padding-top: 22px;
      border-top: 1px solid var(--rule);
      font-family: var(--f-ui);
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-size: 11px;
      color: var(--muted);
    }
    .hero__stats b {
      display: block;
      font-family: var(--f-display);
      font-weight: 700;
      font-style: normal;
      font-size: 28px;
      letter-spacing: 0;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .hero__cover {
      position: relative;
      aspect-ratio: 3 / 4;
      background: var(--paper-2);
      overflow: hidden;
      display: block;
      width: 100%;
      max-width: 420px;
    }
    .hero__cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero__cover-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: var(--red);
      color: var(--white);
      font-family: var(--f-ui);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 12px;
    }
    .hero__cover.is-fallback img { display: none; }
    .hero__cover.is-fallback {
      background:
        linear-gradient(180deg, #1a1a1a 0%, #111 60%, #0a0a0a 100%);
    }
    .hero__cover.is-fallback::before {
      content: "REVISTA BNI BUSINESS";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 20px 0;
      font-family: var(--f-ui);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--white);
      opacity: 0.85;
    }
    .hero__cover.is-fallback::after {
      content: "EDIÇÃO\A 02\A —\A ABRIL\A 2026";
      white-space: pre;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: var(--f-display);
      font-weight: 900;
      font-style: italic;
      font-size: clamp(40px, 6vw, 64px);
      line-height: 0.95;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    /* ============================================================
       INDEX HEADER
       ============================================================ */
    .index-head {
      padding-top: clamp(56px, 8vw, 96px);
      padding-bottom: clamp(28px, 4vw, 48px);
    }
    .index-head__row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--ink);
    }
    .index-head__title {
      font-family: var(--f-display);
      font-weight: 700;
      font-style: italic;
      font-size: clamp(36px, 5vw, 64px);
      letter-spacing: -0.01em;
      line-height: 1;
      margin: 0;
    }
    .index-head__count {
      font-family: var(--f-ui);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .index-head__count b {
      color: var(--ink);
      font-weight: 600;
    }

    /* ============================================================
       GRID
       ============================================================ */
    .grid {
      padding-bottom: clamp(80px, 10vw, 140px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(28px, 3.2vw, 48px) clamp(20px, 2.4vw, 36px);
      align-items: stretch;
    }

    /* ============================================================
       CARD
       ============================================================ */
    .card {
      display: flex;
      flex-direction: column;
      position: relative;
      isolation: isolate;
      height: 100%;
    }
    .card__num {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--red);
      color: var(--white);
      font-family: var(--f-ui);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .card__media {
      position: relative;
      aspect-ratio: 1200 / 630;
      overflow: hidden;
      background: var(--paper-2);
      margin-bottom: 16px;
    }
    .card__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(.2,.7,.2,1);
    }
    .card:hover .card__media img,
    .card:focus-visible .card__media img {
      transform: scale(1.04);
    }

    .card__media.is-fallback img { display: none; }
    .card__media.is-fallback {
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.05) 0 12px,
          rgba(255,255,255,0)    12px 24px
        ),
        #1a1a1a;
    }
    .card__media.is-fallback::before {
      content: attr(data-retranca);
      position: absolute;
      inset: auto 16px 14px 16px;
      font-family: var(--f-ui);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--red);
      text-transform: uppercase;
    }

    .card__retranca {
      margin-bottom: 8px;
    }

    .card__title {
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 0 0 18px 0;
      text-wrap: balance;
    }
    .card__title-inner {
      background-image: linear-gradient(var(--ink), var(--ink));
      background-repeat: no-repeat;
      background-position: 0 100%;
      background-size: 0% 1px;
      transition: background-size 0.45s cubic-bezier(.2,.7,.2,1);
      padding-bottom: 2px;
    }
    .card:hover .card__title-inner,
    .card:focus-visible .card__title-inner {
      background-size: 100% 1px;
    }

    .card__foot {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--f-ui);
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .card__foot span:last-child {
      transition: transform 0.35s ease;
    }
    .card:hover .card__foot span:last-child {
      transform: translateX(3px);
      color: var(--ink);
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .hero { padding-top: 50px; padding-bottom: 50px; }
      .hero__grid { flex-direction: column; }
      .hero__cover { max-width: 420px; aspect-ratio: 3 / 4; }
    }
    @media (max-width: 768px) {
      body { font-size: 16px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 24px 14px; }
      .hero__stats { flex-wrap: wrap; gap: 24px; }
      .index-head__row { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>

  <main>

    <!-- ============================================================
         HERO
         ============================================================ -->
    <section class="hero">
      <div class="container">
        <div class="hero__grid">

          <div class="hero__copy">
            <div class="retranca hero__retranca fade-up d1">EDITION 02</div>
            <h1 class="hero__title fade-up d2">
              April<br><em>2026</em>
            </h1>
            <p class="hero__sub fade-up d3">
              16 articles connecting real stories to real opportunities.
            </p>

            <div class="hero__stats fade-up d4">
              <div>
                <b>16</b>
                <span>Articles</span>
              </div>
              <div>
                <b>09</b>
                <span>Sections</span>
              </div>
              <div>
                <b>04 / 26</b>
                <span>Quarterly edition</span>
              </div>
            </div>
          </div>

          <a class="hero__cover fade-up d2" href="/en/edicao-02/materia-de-capa/" aria-label="Cover story: The strategist behind the new generation of works">            <img src="/capa2.webp?v=2" alt="Cover of Edition 02 of BNI Business Magazine" onerror="this.parentElement.classList.add('is-fallback')">
          </a>

        </div>
      </div>
    </section>

    <!-- ============================================================
         ÍNDICE / GRID
         ============================================================ -->
    <section class="container index-head">
      <div class="index-head__row">
        <h2 class="index-head__title">Contents</h2>
        <div class="index-head__count">
          <b>01 — 16</b> · <span>Articles in this edition</span>
        </div>
      </div>
    </section>

    <section class="container grid" id="articles" aria-label="Articles in Edition 02">
      <!-- Cards injetados por JS abaixo -->
    </section>  </main>

  <script>
    // ============================================================
    // DADOS DAS 16 MATÉRIAS
    // Para replicar em /en/ e /es/ basta traduzir retranca + title + COPY.
    // ============================================================

    const COPY = {
      "card.read":     "Read article"
    };

    const ARTICLES = [
      { n: "01", retranca: "EVENTS",                  title: "What does a cigar have to do with you",             slug: "eventos" },
      { n: "02", retranca: "SUCCESS STORY",           title: "When BNI goes beyond networking",                   slug: "magna-marinho" },
      { n: "03", retranca: "SUCCESS STORY",           title: "How much is the right connection worth?",           slug: "jrt-print" },
      { n: "04", retranca: "COVER STORY",             title: "The strategist behind the new generation of works", slug: "materia-de-capa" },
      { n: "05", retranca: "EDITORIAL",               title: "The printed word that digital cannot replace",      slug: "alef-editora" },
      { n: "06", retranca: "BUSINESS",                title: "Well-being that reaches everyone",                  slug: "up-brasil" },
      { n: "07", retranca: "MENTAL HEALTH",           title: "The silent revolution of mental health",            slug: "tonos" },
      { n: "08", retranca: "LAW",                     title: "The future you haven't planned could cost you",    slug: "aposenta-sp" },
      { n: "09", retranca: "STYLE",                   title: "The brilliance your brand deserves",                slug: "msr-device-golden-store" },
      { n: "10", retranca: "BNI WORLD",               title: "The English that opens doors",                      slug: "bni-mundi" },
      { n: "11", retranca: "RECOGNITION",             title: "A night to celebrate those who make a difference",  slug: "reconhecimento" },
      { n: "12", retranca: "PERSONAL DEVELOPMENT",    title: "The man who compresses decades into seven days",    slug: "massaru-ogata" },
      { n: "13", retranca: "EVENTS",                  title: "From São Paulo to Brazil: the Salleven journey",    slug: "salleven-eventos" },
      { n: "14", retranca: "TOURISM",                 title: "Monaco is waiting — and so is your BNI crew",       slug: "monaco" },
      { n: "15", retranca: "BUSINESS",                title: "FIA Business School: knowledge and decision-making", slug: "fia-business-school" },
      { n: "16", retranca: "BNI SÃO FRANCISCO",       title: "The group that defied expectations",                slug: "bni-sao-francisco" }
    ];

    const escapeHTML = (s) => String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#039;");

    function renderCards() {
      const grid = document.getElementById("articles");
      const html = ARTICLES.map((a, i) => {
        const href  = `/en/edicao-02/${a.slug}/`;
        const img   = `/edicao-02/${a.slug}/img/og-cover.webp`;
        const delay = (0.05 + (i % 4) * 0.05).toFixed(2);
        return `
          <a class="card fade-up" href="${href}" style="animation-delay:${delay}s" aria-label="${escapeHTML(a.retranca)}: ${escapeHTML(a.title)}">
            <div class="card__media" data-retranca="${escapeHTML(a.retranca)}">
              <img src="${img}" alt="${escapeHTML(a.title)}" loading="lazy" decoding="async"
                   onerror="this.parentElement.classList.add('is-fallback')">
              <div class="card__num" aria-hidden="true">${a.n}</div>
            </div>
            <div class="retranca card__retranca">${escapeHTML(a.retranca)}</div>
            <h3 class="card__title"><span class="card__title-inner">${escapeHTML(a.title)}</span></h3>
            <div class="card__foot" aria-hidden="true">
              <span>${a.n} / 16</span>
              <span>${COPY["card.read"]} →</span>
            </div>
          </a>
        `;
      }).join("");
      grid.innerHTML = html;
    }

    renderCards();
  </script>

</body>
</html>
