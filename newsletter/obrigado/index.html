<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição confirmada — Revista BNI Business</title>
  <meta name="description" content="Sua inscrição na Revista BNI Business está confirmada. A próxima edição chega primeiro pra você.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@400;600&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vermelho: #C8102E;
      --escuro: #2b2c2f;
      --creme: #F5F0E8;
      --creme-escuro: #E5DECF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--creme);
      color: var(--escuro);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Ocultar coluna 3 e footer-bar (injetados por footer.js) ── */
    #bni-footer div:has(> #footer-newsletter-wrap) { display: none !important; }
    #bni-footer .footer-bar { display: none !important; }

    /* ── Animação de entrada ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0;
      animation: fadeIn 0.7s ease forwards;
    }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.42s; }
    .d4 { animation-delay: 0.58s; }

    /* ── Layout principal ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem 5rem;
    }

    .container {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    /* ── Inscrição Confirmada → estilo título Playfair ── */
    .inscricao {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 3.6rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--vermelho);
      margin-bottom: 1.4rem;
      letter-spacing: -0.5px;
    }

    /* ── Separador decorativo ── */
    .divider {
      width: 36px;
      height: 1.5px;
      background: var(--vermelho);
      margin: 0 auto 1.4rem;
      opacity: 0.5;
    }

    /* ── Bem-vindo → estilo badge ── */
    .bemvindo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--escuro);
      margin-bottom: 1.8rem;
    }

    /* ── Parágrafo editorial ── */
    .editorial {
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--escuro);
      opacity: 0.82;
      margin-bottom: 2.8rem;
      text-align: center;
    }

    .editorial p + p {
      margin-top: 1rem;
    }

    .deliverability-tip {
      font-size: 0.9375rem;
      opacity: 0.7;
      font-weight: 400;
    }

    /* ── Capa + CTA ── */
    .capa-wrap {
      margin-bottom: 2.4rem;
    }

    .capa-link {
      display: inline-block;
      line-height: 0;
      margin-bottom: 1.1rem;
    }

    .capa-img {
      width: 100%;
      max-width: 200px;
      border-radius: 3px;
      box-shadow: 0 12px 40px rgba(43, 44, 47, 0.14);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .capa-link:hover .capa-img {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(43, 44, 47, 0.2);
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--vermelho);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, gap 0.2s;
    }

    .cta-link:hover {
      border-bottom-color: var(--vermelho);
      gap: 0.55rem;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      main {
        padding: 3rem 1.25rem 4rem;
        align-items: flex-start;
      }

      .editorial {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <main>
    <div class="container">

      <p class="inscricao fade-in d1">Inscrição Confirmada</p>

      <div class="divider fade-in d1"></div>

      <div class="editorial fade-in d2">
        <p><strong>Enquanto a Edição 3 não sai, conheça a história de capa da atual.</strong></p>
        <p class="deliverability-tip">Adicione <strong>contato@bnibusiness.com.br</strong> aos seus contatos — isso garante que nenhuma edição se perca em "Promoções" ou "Spam".</p>
      </div>

      <div class="capa-wrap fade-in d4">
        <a href="https://bnibusiness.com.br/edicao-02/" class="capa-link" title="Ler a Edição 2 da Revista BNI Business">
          <img
            src="/capa2.webp?v=2"
            alt="Capa da Edição 2 da Revista BNI Business"
            class="capa-img"
            loading="lazy"
          >
        </a>
        <br>
        <a href="https://bnibusiness.com.br/edicao-02/" class="cta-link">
          Ler a Edição 2
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>

    </div>
  </main>

  <script src="../../footer.js?v=2026051301" defer></script>
</body>
</html>
