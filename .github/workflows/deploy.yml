name: Deploy para Locaweb

# ──────────────────────────────────────────────────────────────
# Secrets necessários no GitHub (Settings → Secrets → Actions):
#
#   SSH_KEY   → chave privada SSH (formato OpenSSH, ed25519)
#               do usuário bnibusiness1 na Locaweb,
#               armazenada como base64 (para evitar problemas
#               de line endings ao colar no GitHub UI).
#
#   Para regenerar:
#     base64 -i caminho/para/chave_privada | pbcopy
#     # cola o valor copiado no secret SSH_KEY do GitHub
#
# A chave pública correspondente está em ~/.ssh/authorized_keys
# do usuário bnibusiness1 no servidor.
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Configurar chave SSH (decode base64)
        env:
          SSH_KEY_B64: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Validacao: extrai chave publica para confirmar que parse funcionou
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null && echo "Chave SSH carregada com sucesso"
          ssh-keyscan -p 22 ftp.bnibusiness.com.br >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync sobre SSH
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='*.nfs*' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ bnibusiness1@ftp.bnibusiness.com.br:/home/bnibusiness1/public_html/
