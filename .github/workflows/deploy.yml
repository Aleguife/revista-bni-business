name: Deploy para Locaweb

# ──────────────────────────────────────────────────────────────
# Secrets necessários no GitHub (Settings → Secrets → Actions):
#
#   SSH_KEY   → chave privada SSH (formato OpenSSH, ed25519)
#               do usuário bnibusiness1 na Locaweb
#
# A chave pública correspondente está em ~/.ssh/authorized_keys
# do usuário bnibusiness1 no servidor.
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Configurar agente SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Adicionar host conhecido
        run: ssh-keyscan -p 22 ftp.bnibusiness.com.br >> ~/.ssh/known_hosts

      - name: Deploy via rsync sobre SSH
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='*.nfs*' \
            --exclude='README.md' \
            -e "ssh -p 22" \
            ./ bnibusiness1@ftp.bnibusiness.com.br:/home/bnibusiness1/public_html/
